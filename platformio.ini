; CoinDeck — Waveshare ESP32-S3-Touch-AMOLED-1.8 (N16R8 module)
; 16MB flash, 8MB octal PSRAM, SH8601 AMOLED 368x448, FT3168 touch, QMI8658 IMU

[env:waveshare_s3_amoled_18]
; pioarduino fork ships Arduino-ESP32 core 3.x (needed by Arduino_GFX for SH8601);
; pinned to the same Arduino release Waveshare tested their demo against.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.35/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

; --- Board overrides for the N16R8 module on this Waveshare board ---
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

; Octal PSRAM (OPI) — required for the R8 variant, otherwise PSRAM won't init
board_build.arduino.memory_type = qio_opi

; Native USB CDC so Serial works over the single USB-C port (no extra UART chip)
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3

monitor_speed = 115200
upload_speed = 921600

; Step 2 — SH8601 AMOLED display via Arduino_GFX (LVGL, JSON come later)
lib_deps =
    moononournation/GFX Library for Arduino@^1.6.5
