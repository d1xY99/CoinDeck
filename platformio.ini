; CoinDeck — porting to DIYMORE ESP32-S3 3.5" Capacitive Touch LCD 320x480
; MPN: AM03DE-FBBA0079-002. PSRAM type/size and display/touch driver still TBD —
; this env is intentionally minimal (no qio_opi, no PSRAM assumptions) for the
; bring-up smoke test. We'll tune after we know what's on the board.
;
; The Waveshare 1.8" AMOLED firmware lives in git history (commit cd8e842 and earlier).

[env:diymore_s3_35]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.35/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L

; Sparkle IoT XH-S3E module = N16R8 (16MB flash + 8MB octal PSRAM).
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.arduino.memory_type = qio_opi

; Native USB CDC for Serial — confirmed by lsusb (303a:1001 Espressif native USB).
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=3

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    moononournation/GFX Library for Arduino@^1.6.5
    bblanchon/ArduinoJson@^7.2.0
